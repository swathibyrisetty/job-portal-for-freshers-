<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — new-gen-st</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="nav">
  <div class="container">
    <a href="index.html" class="brand"><span class="mark">NG</span> new-gen-st</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="jobs.html">Browse jobs</a></li>
    </ul>
    <div class="nav-actions">
      <a href="register.html" class="btn btn-outline btn-sm">Create account</a>
      <button class="nav-toggle" aria-label="Toggle menu"><span></span></button>
    </div>
  </div>
</nav>

<section style="padding-block:4rem;">
  <div class="container" style="max-width:420px;">
    <div class="jd-card">
      <span class="eyebrow">Welcome back</span>
      <h2 style="margin-top:.5rem;">Log in to new-gen-st</h2>
      <p style="color:var(--ink-soft); font-size:.9rem; margin-bottom:1.5rem;">Log in to apply to roles and track your applications.</p>

      <div id="authError" role="alert" style="background:#FBEAE7; color:var(--danger); border:1px solid var(--danger); border-radius:8px; padding:.7em 1em; font-size:.88rem; margin-bottom:1rem;" hidden></div>

      <form id="loginForm" style="display:flex; flex-direction:column; gap:1rem;">
        <label style="font-size:.85rem; font-weight:600; color:var(--navy);">
          Email
          <input type="email" id="email" required style="display:block; width:100%; margin-top:.4rem; border:1px solid var(--rule); border-radius:8px; padding:.75em 1em; font-family:var(--body); font-size:.95rem;">
        </label>
        <label style="font-size:.85rem; font-weight:600; color:var(--navy);">
          Password
          <input type="password" id="password" required style="display:block; width:100%; margin-top:.4rem; border:1px solid var(--rule); border-radius:8px; padding:.75em 1em; font-family:var(--body); font-size:.95rem;">
        </label>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>

      <p style="font-size:.88rem; color:var(--ink-soft); text-align:center; margin-top:1.4rem;">
        New to new-gen-st? <a href="register.html" style="color:var(--gold-deep); font-weight:600;">Create an account</a>
      </p>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 new-gen-st. All rights reserved.</span>
      <span>Made for freshers, everywhere.</span>
    </div>
  </div>
</footer>

<script src="assets/script.js"></script>
</body>
</html>
